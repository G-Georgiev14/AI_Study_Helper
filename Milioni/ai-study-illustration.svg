<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Laptop Base -->
  <rect x="50" y="180" width="300" height="8" rx="2" fill="#64748b"/>
  <rect x="80" y="188" width="240" height="60" rx="4" fill="#475569"/>
  
  <!-- Laptop Screen -->
  <rect x="60" y="60" width="280" height="180" rx="8" fill="#1e293b"/>
  <rect x="70" y="70" width="260" height="160" rx="4" fill="#f8fafc"/>
  
  <!-- Prompt Cards Floating -->
  <!-- Card 1 -->
  <g transform="rotate(-5 120 40)">
    <rect x="80" y="20" width="80" height="40" rx="4" fill="#667eea" opacity="0.9"/>
    <text x="120" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="600">Essay Helper</text>
    <text x="120" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6">AI Prompt</text>
  </g>
  
  <!-- Card 2 -->
  <g transform="rotate(3 280 50)">
    <rect x="240" y="30" width="80" height="40" rx="4" fill="#764ba2" opacity="0.9"/>
    <text x="280" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="600">Math Solver</text>
    <text x="280" y="55" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6">AI Prompt</text>
  </g>
  
  <!-- Card 3 -->
  <g transform="rotate(-2 200 25)">
    <rect x="160" y="5" width="80" height="40" rx="4" fill="#f59e0b" opacity="0.9"/>
    <text x="200" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="600">Project Ideas</text>
    <text x="200" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6">AI Prompt</text>
  </g>
  
  <!-- Screen Content -->
  <text x="200" y="100" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="700">AI Study Helper</text>
  <text x="200" y="120" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">50+ Ready-to-Use Prompts</text>
  
  <!-- List items on screen -->
  <text x="90" y="145" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ Homework Assistant</text>
  <text x="90" y="160" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ Essay Writer</text>
  <text x="90" y="175" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ Math Problem Solver</text>
  <text x="90" y="190" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ Project Ideas</text>
  
  <text x="200" y="145" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ Study Notes</text>
  <text x="200" y="160" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ Test Prep</text>
  <text x="200" y="175" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ Research Help</text>
  <text x="200" y="190" fill="#64748b" font-family="Arial, sans-serif" font-size="8">✓ +40 More!</text>
  
